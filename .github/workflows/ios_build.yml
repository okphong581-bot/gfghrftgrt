name: Build Xocket iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Create project files if missing
        run: flutter create .

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup Info.plist Permissions
        run: |
          cd ios/Runner
          plutil -replace CFBundleDisplayName -string "Xocket" Info.plist
          plutil -replace CFBundleName -string "Xocket" Info.plist
          plutil -replace NSCameraUsageDescription -string "Xocket cần quyền camera để chụp ảnh gửi bạn bè" Info.plist
          plutil -replace NSPhotoLibraryUsageDescription -string "Xocket cần quyền thư viện ảnh" Info.plist
          plutil -replace NSMicrophoneUsageDescription -string "Xocket cần quyền micro" Info.plist

      - name: Build iOS IPA (No Codesign)
        run: |
          cd ios
          
          # Fix iOS Deployment Target to 13.0 for plugins
          sed -i '' "s/^# platform :ios, .*/platform :ios, '13.0'/g" Podfile || true
          
          # Patch Podfile to disable code signing for all Pods
          sed -i '' "s/flutter_additional_ios_build_settings(target)/flutter_additional_ios_build_settings(target)\n      target.build_configurations.each do |config|\n        config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n        config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n        config.build_settings['CODE_SIGN_IDENTITY'] = ''\n        config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''\n      end/g" Podfile || true
          
          # Patch Runner.xcodeproj to disable code signing
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' Runner.xcodeproj/project.pbxproj || true
          
          # Cài đặt Pods
          pod install || true
          
          # Chạy lệnh build flutter trước để build code Dart (nếu lỗi signing thì bỏ qua)
          flutter build ios --release --no-codesign || true
          
          # Ép Xcode build bỏ qua tất cả chứng chỉ
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SYMROOT=$PWD/../build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" > xcodebuild_log.txt 2>&1 || (echo "XCODE BUILD FAILED. LAST 200 LINES:" && tail -n 200 xcodebuild_log.txt && exit 1)
          
      - name: Create Payload and Zip
        run: |
          mkdir Payload
          if [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            cp -r build/ios/Release-iphoneos/Runner.app Payload/
          else
            cp -r build/ios/iphoneos/Runner.app Payload/
          fi
          zip -r app.ipa Payload
          mkdir -p build/ios/iphoneos
          mv app.ipa build/ios/iphoneos/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xocket-app-ipa
          path: build/ios/iphoneos/app.ipa
